<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Création – IRVE Breizh</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="breizh_style.css"/>
</head>
<body>

<!-- DEMO NAV -->
<div id="demo-nav">
  <span>Back-End</span>
  <button class="demo-btn" data-page="accueil" onclick="show('accueil')">🏠 Accueil /back/</button>
  <button class="demo-btn" data-page="liste" onclick="show('liste')">📋 Liste /back/liste</button>
  <button class="demo-btn" data-page="creation" onclick="show('creation')">➕ Création /back/create</button>
  <button class="demo-btn" data-page="modification" onclick="show('modification')">✏️ Modification /back/edit/{id}</button>
  <button class="demo-btn" data-page="detail" onclick="show('detail')">🔍 Détail /back/detail/{id}</button>
</div>

<div class="page-wrapper">
  <header>
    <div class="header-brand">
      <div class="header-logo"><img src="../assets/logo_breizh_charge_groupe43_v2.png" alt="Breizh Ohm"/></div>
      <span class="brand-name">Breizh Ohm</span>
    </div>
    <nav>
      <a onclick="show('accueil')">Accueil</a>
      <a onclick="show('liste')">Liste</a>
      <a class="active">Ajouter</a>
    </nav>
  </header>

  <main>
    <section>
      <div class="section-layout">
        <div>
          <div class="section-title">Saisie d'un nouveau point de charge</div>
          <p style="font-size:13px;color:#aaa;margin-top:10px;">Remplissez les informations ci-contre pour ajouter une nouvelle installation.</p>
        </div>
        <div class="form-wrap">
          <div class="form-row">
            <div class="form-group">
              <label>Nom aménageur <span class="req">*</span></label>
              <input type="text" placeholder="ex : LE ROUX LOISIRS"/>
            </div>
            <div class="form-group">
              <label>Siren aménageur <span class="req">*</span></label>
              <input type="text" placeholder="ex : 453386120"/>
            </div>
          </div>
          <div class="form-group">
            <label>Contact aménageur</label>
            <input type="email" placeholder="contact@example.com"/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Nom opérateur <span class="req">*</span></label>
              <input type="text" placeholder="ex : freshmile"/>
            </div>
            <div class="form-group">
              <label>Type de prise <span class="req">*</span></label>
              <select><option value="">-- Sélectionner --</option><option>T2</option><option>T3 (CCS)</option><option>CHAdeMO</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Nombre de PDC <span class="req">*</span></label>
              <input type="number" placeholder="3" min="1"/>
            </div>
            <div class="form-group">
              <label>Puissance nominale (kW)</label>
              <input type="number" placeholder="22" step="0.1"/>
            </div>
          </div>
          <div class="form-group">
            <label>Commune <span class="req">*</span></label>
            <input type="text" placeholder="ex : Rennes"/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Latitude <span class="req">*</span></label>
              <input type="number" placeholder="48.11726" step="0.00001"/>
            </div>
            <div class="form-group">
              <label>Longitude <span class="req">*</span></label>
              <input type="number" placeholder="-1.67792" step="0.00001"/>
            </div>
          </div>
          <div class="form-group">
            <label>Département <span class="req">*</span></label>
            <select><option value="">--</option><option>29 – Finistère</option><option>35 – Ille-et-Vilaine</option><option>22 – Côtes-d'Armor</option><option>56 – Morbihan</option></select>
          </div>
          <div class="form-actions">
            <button class="btn btn-outline" onclick="show('liste')">Annuler</button>
            <button class="btn btn-primary">Enregistrer l'installation</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-brand"><div class="footer-logo"><img src="../assets/logo_breizh_charge_groupe43_v2.png" alt="Breizh Ohm"/></div><div><div class="footer-name">Breizh Ohm</div></div></div>
    <div class="footer-meta"><p>Florian Muller / Rafaël Touzé</p><p>CIN2 2026 groupe 13</p></div>
  </footer>
</div>

<script src="breizh_script.js"></script>
</body>
</html>
