<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liste – IRVE Breizh</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="breizh_style.css"/>
</head>
<body>

<!-- DEMO NAV -->
<div id="demo-nav">
  <span>Back-End</span>
  <button class="demo-btn" data-page="accueil" onclick="show('accueil')">🏠 Accueil /back/</button>
  <button class="demo-btn" data-page="creation" onclick="show('creation')">➕ Création /back/create</button>
  <!-- <button class="demo-btn" data-page="modification" onclick="show('modification')">✏️ Modification /back/edit/{id}</button> -->
  <button class="demo-btn" data-page="detail" onclick="show('detail')">🔍 Détail /back/detail/{id}</button>
  <button class="demo-btn" data-page="liste" onclick="show('liste')">📋 Liste /back/liste</button>
</div>

<div class="page-wrapper">
  <header>
    <div class="header-brand">
      <div class="header-logo"><img src="../assets/logo_breizh_charge_groupe43_v2.png" alt="Breizh Ohm"/></div>
      <span class="brand-name">Breizh Ohm</span>
    </div>
    <nav>
      <a onclick="show('accueil')">Accueil</a>
      <a class="active">Liste</a>
      <a onclick="show('creation')">Ajouter</a>
    </nav>
  </header>

  <main>
    <section>
      <div class="list-header">
        <div>
          <div class="section-title" style="margin-bottom:6px;">Liste des installations</div>
          <div class="list-count" id="liste-count">Chargement…</div>
        </div>
        <button class="btn btn-primary" onclick="show('creation')">+ Ajouter une installation</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Aménageur</th><th>Opérateur</th><th>Commune</th><th>Nb PDC</th><th>Type prise</th><th>Puissance</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="liste-tbody">
            <tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px;">Chargement des données…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-brand"><div class="footer-logo"><img src="../assets/logo_breizh_charge_groupe43_v2.png" alt="Breizh Ohm"/></div><div><div class="footer-name">Breizh Ohm</div></div></div>
    <div class="footer-meta"><p>Florian Muller / Rafaël Touzé</p><p>CIN2 2026 groupe 13</p></div>
  </footer>
</div>

<script src="breizh_script.js"></script>
<script>
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

document.addEventListener('DOMContentLoaded', async () => {
  const tbody   = document.getElementById('liste-tbody');
  const countEl = document.getElementById('liste-count');

  try {
    const res  = await fetch('php/api.php?action=liste');
    const data = await res.json();

    countEl.textContent = data.length + ' enregistrement(s) — affichage limité à 100';

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px;">Aucune donnée trouvée.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(row => `
      <tr>
        <td>${esc(row.id)}</td>
        <td>${esc(row.nom_amenageur)}</td>
        <td>${esc(row.nom_operateur)}</td>
        <td>${esc(row.nom_commune)}</td>
        <td>${esc(row.nbre_pdc)}</td>
        <td>${esc(row.type_prise)}</td>
        <td>${row.puissance_nominale ? esc(row.puissance_nominale) + ' kW' : '—'}</td>
        <td class="actions-cell">
          <button class="btn btn-outline btn-sm" onclick="show('detail',${row.id})">Voir</button>
          <button class="btn btn-outline btn-sm" onclick="show('modification',${row.id})">Éditer</button>
        </td>
      </tr>`).join('');

  } catch (err) {
    tbody.innerHTML   = '<tr><td colspan="8" style="text-align:center;color:#e74c3c;padding:24px;">Erreur de connexion à la base de données.</td></tr>';
    countEl.textContent = 'Erreur de chargement';
  }
});
</script>
</body>
</html>
