<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modification – IRVE Breizh</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="breizh_style.css"/>
</head>
<body>

<!-- DEMO NAV -->
<div id="demo-nav">
  <span>Back-End</span>
  <button class="demo-btn" data-page="accueil" onclick="show('accueil')">🏠 Accueil /back/</button>
  <button class="demo-btn" data-page="creation" onclick="show('creation')">➕ Création /back/create</button>
  <!-- <button class="demo-btn" data-page="modification" onclick="show('modification')">✏️ Modification /back/edit/{id}</button> -->
  <button class="demo-btn" data-page="detail" onclick="show('detail')">🔍 Détail /back/detail/{id}</button>
  <button class="demo-btn" data-page="liste" onclick="show('liste')">📋 Liste /back/liste</button>
</div>

<div class="page-wrapper">
  <header>
    <div class="header-brand">
      <div class="header-logo"><img src="../assets/logo_breizh_charge_groupe43_v2.png" alt="Breizh Ohm"/></div>
      <span class="brand-name">Breizh Ohm</span>
    </div>
    <nav>
      <a onclick="show('accueil')">Accueil</a>
      <a onclick="show('liste')">Liste</a>
      <a onclick="show('creation')">Ajouter</a>
    </nav>
  </header>

  <main>
    <section>
      <div class="section-layout">
        <div>
          <div class="section-title">Modifier un point de charge</div>
          <p style="font-size:13px;color:#aaa;margin-top:10px;">Modifiez les champs souhaités puis sauvegardez.</p>
        </div>
        <div class="form-wrap">
          <div id="form-alert" style="display:none;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:14px;"></div>

          <div class="form-row">
            <div class="form-group">
              <label>Nom aménageur <span class="req">*</span></label>
              <input id="nom_amenageur" type="text" placeholder="ex : LE ROUX LOISIRS"/>
            </div>
            <div class="form-group">
              <label>Siren aménageur</label>
              <input id="siren_amenageur" type="text" placeholder="ex : 453386120"/>
            </div>
          </div>
          <div class="form-group">
            <label>Contact aménageur</label>
            <input id="contact_amenageur" type="email" placeholder="ex : tech@domainependruc.com"/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Nom opérateur</label>
              <input id="nom_operateur" type="text" placeholder="ex : freshmile"/>
            </div>
            <div class="form-group">
              <label>Type de prise</label>
              <select id="type_prise">
                <option value="">-- Sélectionner --</option>
                <option>T2</option>
                <option>T3 (CCS)</option>
                <option>CHAdeMO</option>
                <option>EF</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Nombre de PDC</label>
              <input id="nbre_pdc" type="number" placeholder="ex : 3"/>
            </div>
            <div class="form-group">
              <label>Puissance (kW)</label>
              <input id="puissance_nominale" type="number" placeholder="ex : 22" step="0.1"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Commune</label>
              <input id="nom_commune" type="text" placeholder="ex : Rennes"/>
            </div>
            <div class="form-group">
              <label>Date de mise en service</label>
              <input id="date_mise_en_service" type="date"/>
            </div>
          </div>
          <div class="form-actions" style="justify-content:space-between;">
            <button id="btn-supprimer" class="btn" style="background:#fde8e8;color:#c0392b;border:1px solid #fca5a5;" onclick="supprimerInstallation()">Supprimer</button>
            <div style="display:flex;gap:10px;">
              <button class="btn btn-outline" id="btn-annuler" onclick="annuler()">Annuler</button>
              <button id="btn-submit" class="btn btn-primary" onclick="enregistrerModification()">Enregistrer</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-brand"><div class="footer-logo"><img src="../assets/logo_breizh_charge_groupe43_v2.png" alt="Breizh Ohm"/></div><div><div class="footer-name">Breizh Ohm</div></div></div>
    <div class="footer-meta"><p>Florian Muller / Rafaël Touzé</p><p>CIN2 2026 groupe 13</p></div>
  </footer>
</div>

<script src="breizh_script.js"></script>
<script>
const params    = new URLSearchParams(window.location.search);
const currentId = parseInt(params.get('id')) || 0;

function g(id) { return document.getElementById(id); }

function showAlert(msg, isError) {
  const el = g('form-alert');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = isError ? '#fde8e8' : '#e8f5e9';
  el.style.color      = isError ? '#c0392b'  : '#2e7d32';
}

function annuler() {
  show('detail', currentId || undefined);
}

async function loadItem() {
  if (!currentId) return;
  try {
    const res  = await fetch('php/api.php?action=detail&id=' + currentId);
    const item = await res.json();
    if (!item) return;

    g('nom_amenageur').value      = item.nom_amenageur      || '';
    g('siren_amenageur').value    = item.siren_amenageur    || '';
    g('contact_amenageur').value  = item.contact_amenageur  || '';
    g('nom_operateur').value      = item.nom_operateur      || '';
    g('nbre_pdc').value           = item.nbre_pdc           || '';
    g('puissance_nominale').value = item.puissance_nominale || '';
    g('nom_commune').value        = item.nom_commune        || '';
    g('date_mise_en_service').value = item.date_mise_en_service || '';

    // Pré-sélectionner le type de prise
    const sel = g('type_prise');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === item.type_prise || sel.options[i].text === item.type_prise) {
        sel.selectedIndex = i;
        break;
      }
    }
  } catch (err) {
    showAlert('Impossible de charger les données de cet item.', true);
  }
}

async function enregistrerModification() {
  if (!currentId) { showAlert('Aucun identifiant d\'item fourni.', true); return; }

  const data = {
    nom_amenageur:        g('nom_amenageur').value.trim(),
    siren_amenageur:      g('siren_amenageur').value.trim(),
    contact_amenageur:    g('contact_amenageur').value.trim(),
    nom_operateur:        g('nom_operateur').value.trim(),
    nom_commune:          g('nom_commune').value.trim(),
    nbre_pdc:             parseInt(g('nbre_pdc').value) || null,
    type_prise:           g('type_prise').value,
    puissance_nominale:   g('puissance_nominale').value ? parseFloat(g('puissance_nominale').value) : null,
    date_mise_en_service: g('date_mise_en_service').value || null,
  };

  if (!data.nom_amenageur) { showAlert('Le champ « Nom aménageur » est obligatoire.', true); return; }

  const btn = g('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';

  try {
    const res  = await fetch('php/api.php?action=update&id=' + currentId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const json = await res.json();

    if (json.success) {
      show('detail', currentId);
    } else {
      showAlert('Erreur : ' + (json.error || 'Échec de la mise à jour.'), true);
      btn.disabled = false;
      btn.textContent = 'Enregistrer';
    }
  } catch (err) {
    showAlert('Erreur de connexion à la base de données.', true);
    btn.disabled = false;
    btn.textContent = 'Enregistrer';
  }
}

async function supprimerInstallation() {
  if (!currentId) return;
  if (!confirm('Supprimer définitivement cet enregistrement ?')) return;

  g('btn-supprimer').disabled = true;

  try {
    const res  = await fetch('php/api.php?action=delete&id=' + currentId, { method: 'POST' });
    const json = await res.json();

    if (json.success) {
      show('liste');
    } else {
      showAlert('Erreur lors de la suppression.', true);
      g('btn-supprimer').disabled = false;
    }
  } catch (err) {
    showAlert('Erreur de connexion à la base de données.', true);
    g('btn-supprimer').disabled = false;
  }
}

document.addEventListener('DOMContentLoaded', loadItem);
</script>
</body>
</html>
